<!doctype html>
<html lang="uk">
    <head>
        <meta charset="UTF-8" />
        <title>Єдине стильове оформлення</title>

        <style>
            body {
                background-color: #f5f5f5;
                font-family: Arial, sans-serif;
            }

            div {
                border: 2px solid navy;
                margin: 10px;
                padding: 10px;
                background-color: white;
            }

            h1 {
                color: navy;
                text-align: center;
            }

            p {
                color: #333333;
                font-size: 14pt;
                text-align: justify;
                line-height: 1.5;
            }

            .italic {
                font-style: italic;
            }

            .underline {
                text-decoration: underline;
            }

            .bold {
                font-weight: bold;
            }

            .coloured {
                color: sandybrown;
            }
        </style>
    </head>
    <body>
        <h1>Приклади форматування тексту</h1>

        <div>
            <p class="bold underline">We're surrounded by the dead.</p>
        </div>

        <div>
            <p class="coloured">
                We're among them, and when we finally give up, we become them.
            </p>
        </div>

        <div>
            <p class="italic">We are the walking dead.</p>
        </div>

        <div>
            <p>say that again...</p>
        </div>
    </body>
</html>
